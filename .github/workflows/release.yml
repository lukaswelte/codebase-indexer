name: Release OpenCode Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    name: Build Binary for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: codebase-indexer-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: codebase-indexer-macos-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: codebase-indexer-linux-x64
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/codebase-indexer

  publish:
    name: Publish to NPM
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Create bin directory
        run: mkdir -p plugin/bin
        
      - name: Download all binaries
        uses: actions/download-artifact@v7
        with:
          path: plugin/bin-temp
          
      - name: Re-organize binaries
        run: |
          mv plugin/bin-temp/codebase-indexer-macos-arm64/codebase-indexer plugin/bin/codebase-indexer-macos-arm64
          mv plugin/bin-temp/codebase-indexer-macos-x64/codebase-indexer plugin/bin/codebase-indexer-macos-x64
          mv plugin/bin-temp/codebase-indexer-linux-x64/codebase-indexer plugin/bin/codebase-indexer-linux-x64
          chmod +x plugin/bin/*
          rm -rf plugin/bin-temp

      - name: Build and Publish
        run: |
          cd plugin
          npm install
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
